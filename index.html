<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام قياس الخزانات — بنغازي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1a;
    --panel: #111827;
    --card: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #0ea5e9;
    --success: #22d3a3;
    --warning: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --label: #94a3b8;
    --fuel-petrol: #22d3a3;
    --fuel-diesel: #f59e0b;
    --fuel-kero: #818cf8;
    --fuel-avia: #60a5fa;
  }

  body {
    font-family: 'IBM Plex Sans Arabic', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d1b2e 0%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-icon { font-size: 28px; }
  .header-text h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .header-text p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-badge {
    margin-right: auto;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Layout */
  .container { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

  /* Fuel type tabs */
  .fuel-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--panel);
    padding: 6px;
    border-radius: 14px;
    border: 1px solid var(--border);
  }
  .fuel-tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .fuel-tab .tab-icon { font-size: 20px; }
  .fuel-tab:hover { color: var(--text); background: var(--card); }
  .fuel-tab.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .fuel-tab.petrol.active { color: var(--fuel-petrol); border-bottom: 2px solid var(--fuel-petrol); }
  .fuel-tab.diesel.active { color: var(--fuel-diesel); border-bottom: 2px solid var(--fuel-diesel); }
  .fuel-tab.kero.active { color: var(--fuel-kero); border-bottom: 2px solid var(--fuel-kero); }
  .fuel-tab.avia.active { color: var(--fuel-avia); border-bottom: 2px solid var(--fuel-avia); }

  /* Main card */
  .main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-header h2 { font-size: 15px; font-weight: 600; }
  .card-header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .accent-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    flex-shrink: 0;
  }
  .accent-dot.petrol { background: var(--fuel-petrol); box-shadow: 0 0 8px var(--fuel-petrol); }
  .accent-dot.diesel { background: var(--fuel-diesel); box-shadow: 0 0 8px var(--fuel-diesel); }
  .accent-dot.kero { background: var(--fuel-kero); box-shadow: 0 0 8px var(--fuel-kero); }
  .accent-dot.avia { background: var(--fuel-avia); box-shadow: 0 0 8px var(--fuel-avia); }

  /* Tank selector */
  .tank-selector { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .tank-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .tank-btn {
    flex: 1;
    min-width: 120px;
    padding: 12px 16px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    text-align: center;
    color: var(--text);
  }
  .tank-btn .tank-num { font-size: 22px; font-weight: 700; display: block; }
  .tank-btn .tank-name { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; }
  .tank-btn .tank-range { font-size: 10px; color: var(--muted); display: block; }
  .tank-btn:hover { border-color: var(--accent2); background: rgba(14,165,233,0.08); }
  .tank-btn.selected.petrol { border-color: var(--fuel-petrol); background: rgba(34,211,163,0.08); color: var(--fuel-petrol); }
  .tank-btn.selected.petrol .tank-name, .tank-btn.selected.petrol .tank-range { color: rgba(34,211,163,0.6); }
  .tank-btn.selected.diesel { border-color: var(--fuel-diesel); background: rgba(245,158,11,0.08); color: var(--fuel-diesel); }
  .tank-btn.selected.diesel .tank-name, .tank-btn.selected.diesel .tank-range { color: rgba(245,158,11,0.6); }
  .tank-btn.selected.kero { border-color: var(--fuel-kero); background: rgba(129,140,248,0.08); color: var(--fuel-kero); }
  .tank-btn.selected.kero .tank-name, .tank-btn.selected.kero .tank-range { color: rgba(129,140,248,0.6); }
  .tank-btn.selected.avia { border-color: var(--fuel-avia); background: rgba(96,165,250,0.08); color: var(--fuel-avia); }
  .tank-btn.selected.avia .tank-name, .tank-btn.selected.avia .tank-range { color: rgba(96,165,250,0.6); }

  /* Input section */
  .input-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 24px 0;
  }
  .mode-tab {
    flex: 1;
    padding: 10px 12px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.2s;
  }
  .mode-tab:hover { color: var(--text); border-color: var(--accent2); }
  .mode-tab.active {
    background: rgba(14,165,233,0.1);
    border-color: var(--accent2);
    color: var(--accent);
  }
  .input-row { display: flex; gap: 12px; align-items: flex-end; }
  .input-group { flex: 1; }
  .input-label { font-size: 12px; color: var(--label); font-weight: 500; margin-bottom: 8px; display: block; }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%;
    padding: 14px 50px 14px 16px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    transition: border-color 0.2s;
    outline: none;
    text-align: right;
    direction: ltr;
  }
  .input-wrap input:focus { border-color: var(--accent2); background: rgba(14,165,233,0.05); }
  .input-wrap input::placeholder { color: var(--muted); font-size: 14px; }
  .input-suffix {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .calc-btn {
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--accent2), #0284c7);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(14,165,233,0.3);
  }
  .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,233,0.4); }
  .calc-btn:active { transform: translateY(0); }
  .hint-text { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* Result section */
  .result-section { padding: 24px; }
  .result-empty {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 14px;
  }
  .result-empty .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }

  .result-main {
    text-align: center;
    padding: 20px 24px 28px;
  }
  .result-label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .result-value {
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    color: var(--success);
    letter-spacing: -2px;
    margin-bottom: 6px;
  }
  .result-value.petrol { color: var(--fuel-petrol); }
  .result-value.diesel { color: var(--fuel-diesel); }
  .result-value.kero { color: var(--fuel-kero); }
  .result-value.avia { color: var(--fuel-avia); }
  .result-unit { font-size: 16px; color: var(--muted); font-weight: 500; margin-bottom: 20px; }

  .result-details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
  }
  .detail-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }
  .detail-box .d-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-box .d-value { font-size: 16px; font-weight: 700; color: var(--text); }
  .detail-box .d-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
  }

  /* Copy button */
  .copy-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent2); background: rgba(14,165,233,0.08); color: var(--accent); }
  .copy-btn:active { transform: scale(0.98); }

  /* Progress bar */
  .fill-bar-wrap { margin-top: 20px; padding: 0 4px; }
  .fill-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .fill-bar-bg { background: var(--panel); border-radius: 6px; height: 10px; overflow: hidden; border: 1px solid var(--border); }
  .fill-bar-fg { height: 100%; border-radius: 6px; transition: width 0.6s ease; background: linear-gradient(90deg, var(--fuel-petrol), var(--accent)); }
  .fill-bar-fg.diesel { background: linear-gradient(90deg, #d97706, var(--fuel-diesel)); }
  .fill-bar-fg.kero { background: linear-gradient(90deg, #6366f1, var(--fuel-kero)); }
  .fill-bar-fg.avia { background: linear-gradient(90deg, #2563eb, var(--fuel-avia)); }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 16px 12px; }
    .result-value { font-size: 38px; }
    .result-details { grid-template-columns: 1fr 1fr; }
    .input-row { flex-direction: column; }
    .calc-btn { width: 100%; }
    .fuel-tab { font-size: 11px; }
    .fuel-tab .tab-icon { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🛢️</div>
  <div class="header-text">
    <h1>نظام قياس الخزانات</h1>
    <p>BENGHAZI MARKETING TERMINAL · Tank Calibration System</p>
  </div>
  <div class="header-badge">10 خزانات</div>
</div>

<div class="container">

  <!-- Fuel type tabs -->
  <div class="fuel-tabs">
    <button class="fuel-tab petrol active" onclick="selectFuel('petrol')">
      <span class="tab-icon">⛽</span>
      بنزين
    </button>
    <button class="fuel-tab diesel" onclick="selectFuel('diesel')">
      <span class="tab-icon">🚛</span>
      ديزل
    </button>
    <button class="fuel-tab kero" onclick="selectFuel('kero')">
      <span class="tab-icon">🔥</span>
      كيروسين
    </button>
    <button class="fuel-tab avia" onclick="selectFuel('avia')">
      <span class="tab-icon">✈️</span>
      طيران
    </button>
  </div>

  <!-- Main card -->
  <div class="main-card">
    <div class="card-header">
      <div class="accent-dot petrol" id="accentDot"></div>
      <div>
        <div class="subtitle" id="cardSubtitle">محطة بنغازي التسويقية · Benghazi Marketing Terminal</div>
        <h2 id="cardTitle">خزانات البنزين</h2>
      </div>
    </div>

    <!-- Tank selector -->
    <div class="tank-selector">
      <div class="section-label">اختر الخزان</div>
      <div class="tank-grid" id="tankGrid"></div>
    </div>

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="modeTabForward" onclick="selectMode('forward')">📐 قياس ← لتر</button>
      <button class="mode-tab" id="modeTabReverse" onclick="selectMode('reverse')">🔍 لتر ← قياس</button>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="section-label" id="inputSectionLabel">إدخال القياس</div>
      <div class="input-row">
        <div class="input-group">
          <label class="input-label" id="inputLabel">القياس (mm)</label>
          <div class="input-wrap">
            <input type="number" id="measureInput" placeholder="مثال: 5739" min="0" step="1" />
            <span class="input-suffix" id="inputSuffix">mm</span>
          </div>
          <div class="hint-text" id="hintText">أدخل القياس كاملاً — يقبل الأرقام الكسرية</div>
        </div>
        <button class="calc-btn" id="calcBtn" onclick="calculate()">🔢 احسب</button>
      </div>
    </div>

    <!-- Result -->
    <div class="result-section" id="resultSection">
      <div class="result-empty">
        <div class="empty-icon">📐</div>
        <div>اختر الخزان وأدخل القياس للحصول على الكمية باللتر</div>
      </div>
    </div>
  </div>

</div>

// Format numbers with plain Western digits and thousands separators (never Arabic-Indic)
function fmt(n) {
  return Math.round(n).toLocaleString('en-US');
}

let currentFuel = 'petrol';
let selectedTank = null;
let currentMode = 'forward';
let lastResultText = '';

function selectMode(mode) {
  currentMode = mode;
  document.getElementById('modeTabForward').classList.toggle('active', mode === 'forward');
  document.getElementById('modeTabReverse').classList.toggle('active', mode === 'reverse');

  const input = document.getElementById('measureInput');
  const label = document.getElementById('inputLabel');
  const suffix = document.getElementById('inputSuffix');
  const hint = document.getElementById('hintText');
  const btn = document.getElementById('calcBtn');
  const sectionLabel = document.getElementById('inputSectionLabel');

  if (mode === 'reverse') {
    sectionLabel.textContent = 'إدخال الكمية';
    label.textContent = 'الكمية (لتر)';
    suffix.textContent = 'لتر';
    input.placeholder = 'مثال: 999999';
    hint.textContent = 'أدخل الكمية باللتر — سنجد أقرب قياس مطابق';
    btn.textContent = '🔍 بحث';
  } else {
    sectionLabel.textContent = 'إدخال القياس';
    if (selectedTank) {
      const cfg = FUEL_CONFIG[currentFuel];
      const tank = cfg.tanks.find(t => t.id === selectedTank);
      label.textContent = `القياس (${tank.unit})`;
      suffix.textContent = tank.unit;
    } else {
      label.textContent = 'القياس (mm)';
      suffix.textContent = 'mm';
    }
    input.placeholder = 'مثال: 5739';
    hint.textContent = 'أدخل القياس كاملاً — يقبل الأرقام الكسرية';
    btn.textContent = '🔢 احسب';
  }
  input.value = '';
  clearResult();
}

function selectFuel(fuel) {
  currentFuel = fuel;
  selectedTank = null;
  document.querySelectorAll('.fuel-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.fuel-tab.${fuel}`).classList.add('active');

  const cfg = FUEL_CONFIG[fuel];
  document.getElementById('cardTitle').textContent = cfg.label;
  document.getElementById('cardSubtitle').textContent = cfg.subtitle;
  document.getElementById('accentDot').className = 'accent-dot ' + cfg.color;

  renderTanks();
  clearResult();
}

function renderTanks() {
  const cfg = FUEL_CONFIG[currentFuel];
  const grid = document.getElementById('tankGrid');
  grid.innerHTML = cfg.tanks.map(t => `
    <button class="tank-btn ${selectedTank === t.id ? 'selected '+cfg.color : ''}" onclick="selectTank('${t.id}')">
      <span class="tank-num">${t.id}</span>
      <span class="tank-name">${t.name}</span>
      <span class="tank-range">${t.range}</span>
    </button>
  `).join('');
}

function selectTank(id) {
  selectedTank = id;
  renderTanks();
  const cfg = FUEL_CONFIG[currentFuel];
  const tank = cfg.tanks.find(t => t.id === id);
  const suffix = tank.unit;

  if (currentMode === 'reverse') {
    document.getElementById('inputLabel').textContent = 'الكمية (لتر)';
    document.getElementById('inputSuffix').textContent = 'لتر';
    document.getElementById('hintText').textContent = `النطاق: ${tank.range} — سنجد أقرب قياس مطابق`;
  } else {
    document.getElementById('inputLabel').textContent = `القياس (${suffix})`;
    document.getElementById('inputSuffix').textContent = suffix;
    document.getElementById('hintText').textContent = `النطاق: ${tank.range} · خطوة ${tank.step} ${suffix}`;
  }
  document.getElementById('measureInput').focus();
  clearResult();
}

// Get base volume from table (exact match on step boundary)
function getBaseVolume(tankId, baseMeasurement) {
  const tableData = TANK_DATA[tankId];
  for (let i = 0; i < tableData.length; i++) {
    if (tableData[i][0] === baseMeasurement) return tableData[i][1];
  }
  return null;
}

// Get prop value from prop table for a fractional mm
function getPropValue(tankId, baseMeasurement, fracMm) {
  const frac = Math.round(fracMm);
  if (frac === 0) return 0;
  const p = PROP_DATA[tankId];
  if (!p) return 0;
  // find largest breakpoint <= baseMeasurement
  let bp = p.bps[0];
  for (let i = 0; i < p.bps.length; i++) {
    if (p.bps[i] <= baseMeasurement) bp = p.bps[i];
    else break;
  }
  const bpIdx = p.bps.indexOf(bp);
  const rowIdx = frac - 1; // frac=1 -> row 0
  if (rowIdx < 0 || rowIdx >= p.rows.length) return 0;
  return p.rows[rowIdx][bpIdx] || 0;
}

function calculate() {
  if (currentMode === 'reverse') {
    calculateReverse();
    return;
  }
  if (!selectedTank) {
    showError('الرجاء اختيار الخزان أولاً');
    return;
  }
  const raw = document.getElementById('measureInput').value.trim();
  if (!raw) {
    showError('الرجاء إدخال قيمة القياس');
    return;
  }
  const measurement = parseFloat(raw);
  if (isNaN(measurement) || measurement < 0) {
    showError('قيمة غير صالحة — أدخل رقماً موجباً');
    return;
  }

  const cfg = FUEL_CONFIG[currentFuel];
  const tank = cfg.tanks.find(t => t.id === selectedTank);
  const isCmBased = !!tank.cmBased;

  const tableData = TANK_DATA[selectedTank];
  // tableData index is in CM for cmBased tanks, mm for others
  const tableMinIdx = tableData[0][0], tableMaxIdx = tableData[tableData.length-1][0];
  const minM = isCmBased ? tableMinIdx * 10 : tableMinIdx;
  const maxM = isCmBased ? tableMaxIdx * 10 : tableMaxIdx;

  if (measurement > maxM) {
    showError(`القياس ${measurement} يتجاوز الحد الأقصى للخزان (${fmt(maxM)})`);
    return;
  }
  if (measurement < minM) {
    showError(`القياس ${measurement} أقل من الحد الأدنى للخزان (${fmt(minM)})`);
    return;
  }

  let baseM, fracM, baseV, fracV;

  if (isCmBased) {
    // measurement is in mm. Base = floor to whole cm (10mm), frac = remainder mm (0-9)
    const totalMm = Math.round(measurement);
    const baseCm = Math.floor(totalMm / 10);
    fracM = totalMm - baseCm * 10;
    baseM = baseCm * 10; // displayed in mm
    baseV = getBaseVolume(selectedTank, baseCm); // table indexed by cm
    if (baseV === null) {
      showError('لم يتم العثور على القياس في الجدول');
      return;
    }
    fracV = getPropValue(selectedTank, totalMm, fracM); // breakpoints are in mm scale for 409
  } else {
    const step = tank.step;
    baseM = Math.floor(measurement / step) * step;
    fracM = measurement - baseM;

    // Check dead zones
    const deadZones = DEAD_ZONES[selectedTank] || [];
    for (const dz of deadZones) {
      if (measurement > dz.from && measurement < dz.to) {
        showError(`القياس ${measurement} يقع في ${dz.label} (${dz.from}–${dz.to} mm) — لا توجد بيانات معايرة لهذا النطاق`);
        return;
      }
    }

    baseV = getBaseVolume(selectedTank, baseM);
    if (baseV === null) {
      showError('لم يتم العثور على القياس في الجدول');
      return;
    }
    fracV = getPropValue(selectedTank, baseM, fracM);
  }

  const volume = baseV + fracV;

  // Fill percent
  const fillPct = ((measurement - minM) / (maxM - minM) * 100).toFixed(1);

  showResult(volume, baseM, fracM, baseV, fracV, fillPct, cfg.color, tank.unit, minM, maxM);
}

// Compute volume for a given mm measurement (handles cmBased tanks too)
function computeVolumeAtMm(tankId, tank, mm) {
  const isCmBased = !!tank.cmBased;
  if (isCmBased) {
    const totalMm = Math.round(mm);
    const baseCm = Math.floor(totalMm / 10);
    const fracM = totalMm - baseCm * 10;
    const baseV = getBaseVolume(tankId, baseCm);
    if (baseV === null) return null;
    const fracV = getPropValue(tankId, totalMm, fracM);
    return baseV + fracV;
  } else {
    const step = tank.step;
    const baseM = Math.floor(mm / step) * step;
    const fracM = mm - baseM;
    const baseV = getBaseVolume(tankId, baseM);
    if (baseV === null) return null;
    const fracV = getPropValue(tankId, baseM, fracM);
    return baseV + fracV;
  }
}

function calculateReverse() {
  if (!selectedTank) {
    showError('الرجاء اختيار الخزان أولاً');
    return;
  }
  const raw = document.getElementById('measureInput').value.trim();
  if (!raw) {
    showError('الرجاء إدخال الكمية المطلوبة');
    return;
  }
  const targetVolume = parseFloat(raw);
  if (isNaN(targetVolume) || targetVolume < 0) {
    showError('قيمة غير صالحة — أدخل رقماً موجباً');
    return;
  }

  const cfg = FUEL_CONFIG[currentFuel];
  const tank = cfg.tanks.find(t => t.id === selectedTank);
  const isCmBased = !!tank.cmBased;
  const tableData = TANK_DATA[selectedTank];
  const tableMinIdx = tableData[0][0], tableMaxIdx = tableData[tableData.length-1][0];
  const minMm = isCmBased ? tableMinIdx * 10 : tableMinIdx;
  const maxMm = isCmBased ? tableMaxIdx * 10 : tableMaxIdx;

  const minVol = computeVolumeAtMm(selectedTank, tank, minMm);
  const maxVol = computeVolumeAtMm(selectedTank, tank, maxMm);

  if (targetVolume < minVol) {
    showError(`الكمية ${fmt(targetVolume)} لتر أقل من الحد الأدنى للخزان (${fmt(minVol)} لتر عند ${minMm} ${tank.unit})`);
    return;
  }
  if (targetVolume > maxVol) {
    showError(`الكمية ${fmt(targetVolume)} لتر تتجاوز السعة القصوى للخزان (${fmt(maxVol)} لتر عند ${fmt(maxMm)} ${tank.unit})`);
    return;
  }

  // Binary search over mm range (granularity = 1mm) since volume is monotonically increasing
  let lo = minMm, hi = maxMm;
  while (hi - lo > 1) {
    const mid = Math.floor((lo + hi) / 2);
    const v = computeVolumeAtMm(selectedTank, tank, mid);
    if (v === null) {
      // shouldn't happen with valid range, but fallback: nudge
      hi = mid;
      continue;
    }
    if (v < targetVolume) lo = mid;
    else hi = mid;
  }

  // Compare lo and hi, pick whichever volume is closer to target
  const vLo = computeVolumeAtMm(selectedTank, tank, lo);
  const vHi = computeVolumeAtMm(selectedTank, tank, hi);
  let bestMm, bestVol;
  if (Math.abs(vLo - targetVolume) <= Math.abs(vHi - targetVolume)) {
    bestMm = lo; bestVol = vLo;
  } else {
    bestMm = hi; bestVol = vHi;
  }

  const diff = bestVol - targetVolume;
  const fillPct = ((bestMm - minMm) / (maxMm - minMm) * 100).toFixed(1);

  showReverseResult(bestMm, bestVol, targetVolume, diff, fillPct, cfg.color, tank.unit, minMm, maxMm);
}

function showReverseResult(bestMm, bestVol, targetVolume, diff, fillPct, colorClass, unit, minMm, maxMm) {
  const sec = document.getElementById('resultSection');
  const diffLabel = diff === 0 ? 'تطابق تام ✓' : (diff > 0 ? `أعلى بـ ${fmt(diff)} لتر` : `أقل بـ ${fmt(Math.abs(diff))} لتر`);
  const diffColor = diff === 0 ? 'var(--success)' : 'var(--muted)';
  const cfg = FUEL_CONFIG[currentFuel];
  const tank = cfg.tanks.find(t => t.id === selectedTank);
  lastResultText = `${tank.name} (${selectedTank}) — الكمية المطلوبة: ${fmt(targetVolume)} لتر → أقرب قياس: ${fmt(bestMm)} ${unit} (الكمية الفعلية: ${fmt(bestVol)} لتر)`;
  sec.innerHTML = `
    <div class="result-main">
      <div class="result-label">✅ أقرب قياس مطابق</div>
      <div class="result-value ${colorClass}">${fmt(bestMm)}</div>
      <div class="result-unit">${unit}</div>

      <div class="fill-bar-wrap">
        <div class="fill-bar-label">
          <span>${fmt(minMm)} ${unit}</span>
          <span>منسوب الخزان ${fillPct}%</span>
          <span>${fmt(maxMm)} ${unit}</span>
        </div>
        <div class="fill-bar-bg">
          <div class="fill-bar-fg ${colorClass}" id="fillBar" style="width:0%"></div>
        </div>
      </div>

      <div class="result-details">
        <div class="detail-box">
          <div class="d-label">الكمية المطلوبة</div>
          <div class="d-value">${fmt(targetVolume)}</div>
          <div class="d-sub">لتر</div>
        </div>
        <div class="detail-box">
          <div class="d-label">الكمية الفعلية عند ${fmt(bestMm)}${unit}</div>
          <div class="d-value">${fmt(bestVol)}</div>
          <div class="d-sub">لتر</div>
        </div>
        <div class="detail-box">
          <div class="d-label">الفرق</div>
          <div class="d-value" style="color:${diffColor}">${diffLabel}</div>
        </div>
      </div>

      <button class="copy-btn" onclick="copyResult()" id="copyBtn">📋 نسخ النتيجة</button>
    </div>
  `;
  setTimeout(() => {
    const bar = document.getElementById('fillBar');
    if (bar) bar.style.width = Math.min(fillPct, 100) + '%';
  }, 50);
}

function showResult(volume, baseM, fracM, baseV, fracV, fillPct, colorClass, unit, minM, maxM) {
  const sec = document.getElementById('resultSection');
  const cfg = FUEL_CONFIG[currentFuel];
  const tank = cfg.tanks.find(t => t.id === selectedTank);
  lastResultText = `${tank.name} (${selectedTank}) — القياس: ${fmt(baseM + fracM)} ${unit} → الكمية: ${fmt(volume)} لتر`;
  sec.innerHTML = `
    <div class="result-main">
      <div class="result-label">✅ الكمية الكلية</div>
      <div class="result-value ${colorClass}">${fmt(volume)}</div>
      <div class="result-unit">لتر</div>

      <div class="fill-bar-wrap">
        <div class="fill-bar-label">
          <span>${fmt(minM)} ${unit}</span>
          <span>منسوب الخزان ${fillPct}%</span>
          <span>${fmt(maxM)} ${unit}</span>
        </div>
        <div class="fill-bar-bg">
          <div class="fill-bar-fg ${colorClass}" id="fillBar" style="width:0%"></div>
        </div>
      </div>

      <div class="result-details">
        <div class="detail-box">
          <div class="d-label">أقرب قياس (${unit})</div>
          <div class="d-value">${fmt(baseM)}</div>
          <div class="d-sub">الجزء الكسري: ${fracM.toFixed(2)}</div>
        </div>
        <div class="detail-box">
          <div class="d-label">كمية الأساس</div>
          <div class="d-value">${fmt(baseV||volume)}</div>
          <div class="d-sub">لتر</div>
        </div>
        <div class="detail-box">
          <div class="d-label">كمية التناسب</div>
          <div class="d-value">${fmt(fracV)}</div>
          <div class="d-sub">لتر</div>
        </div>
      </div>

      <button class="copy-btn" onclick="copyResult()" id="copyBtn">📋 نسخ النتيجة</button>
    </div>
  `;
  // Animate bar
  setTimeout(() => {
    const bar = document.getElementById('fillBar');
    if (bar) bar.style.width = Math.min(fillPct, 100) + '%';
  }, 50);
}

function showError(msg) {
  document.getElementById('resultSection').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
}

function clearResult() {
  document.getElementById('resultSection').innerHTML = `
    <div class="result-empty">
      <div class="empty-icon">📐</div>
      <div>أدخل القياس للحصول على الكمية باللتر</div>
    </div>`;
  lastResultText = '';
}

function copyResult() {
  if (!lastResultText) return;
  const btn = document.getElementById('copyBtn');
  const showCopied = () => {
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = '✅ تم النسخ';
    setTimeout(() => { if (btn) btn.textContent = original; }, 1500);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lastResultText).then(showCopied).catch(() => fallbackCopy());
  } else {
    fallbackCopy();
  }

  function fallbackCopy() {
    const ta = document.createElement('textarea');
    ta.value = lastResultText;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(); } catch (e) {}
    document.body.removeChild(ta);
  }
}

// Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

// Init
renderTanks();
</script>
